name: Build and Test

on:
  push:
    branches: [main, first-fix]
  pull_request:
    branches: [main, first-fix]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: gcc -o rps rps.c -lm

      - name: Test - run with input
        run: |
          # Verify the binary runs and exits with acceptable return code (-1, 0, or 1)
          echo "r" | ./rps
          exit_code=$?
          case $exit_code in -1|0|1|255) exit 0 ;; *) exit 1 ;; esac
